<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trade With</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b1220;
      color: white;
    }

    h1 {
      color: #00ffc3;
      padding: 20px;
    }

    .container {
      padding: 20px;
    }

    .card {
      background: #111;
      border: 1px solid #222;
      border-radius: 10px;
      padding: 15px;
      margin-bottom: 15px;
    }

    .call {
      color: lime;
    }

    .put {
      color: red;
    }
  </style>
</head>
<body>

  <h1>TRADE WITH</h1>

  <div class="container">
    <h2>Trade History</h2>
    <div id="trades">Loading...</div>
  </div>

  <script>
    const API = "https://s-backend.vercel.app/api"; // ⚠️ apna backend URL

    async function loadTrades() {
      try {
        const res = await fetch(`${API}/history`);
        const data = await res.json();

        const container = document.getElementById("trades");

        if (!data.success || data.trades.length === 0) {
          container.innerHTML = "<p>No trades</p>";
          return;
        }

        container.innerHTML = "";

        data.trades.forEach(t => {
          const pnl = t.exitPrice
            ? (t.dir === "CALL"
                ? t.exitPrice - t.entry
                : t.entry - t.exitPrice)
            : 0;

          const div = document.createElement("div");
          div.className = "card";

          div.innerHTML = `
            <h3 class="${t.dir === "CALL" ? "call" : "put"}">${t.dir}</h3>
            <p>Entry: ${t.entry}</p>
            <p>SL: ${t.sl}</p>
            <p>TP: ${t.tp}</p>
            <p>RR: ${t.rr}</p>
            <p>TF: ${t.tf}</p>
            <p>Exit: ${t.exitPrice || "-"}</p>
            <p>PnL: ${pnl}</p>
          `;

          container.appendChild(div);
        });

      } catch (e) {
        document.getElementById("trades").innerHTML = "Error loading trades";
        console.error(e);
      }
    }

    loadTrades();
  </script>

</body>
</html>
